memory_limit = 1024M
max_execution_time = 600
max_input_time = 600
max_input_vars = 5000

upload_max_filesize = 256M
post_max_size = 256M

opcache.enable=1
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.memory_consumption=256
opcache.max_accelerated_files=20000

error_reporting = E_ALL
display_errors = Off
log_errors = On